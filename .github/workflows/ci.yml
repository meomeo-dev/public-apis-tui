name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
  workflow_dispatch:
    inputs:
      target:
        description: Platform target to run.
        required: true
        default: linux
        type: choice
        options:
          - linux
          - windows
          - all

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NO_COLOR: '1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.target || 'auto' }}
  cancel-in-progress: true

jobs:
  release-preflight-linux:
    name: Release preflight (Linux)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'linux' || inputs.target == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.10.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release preflight
        run: npm run release:preflight

      - name: Pack npm artifact
        run: npm pack --ignore-scripts

      - name: Upload npm artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-apis-cli-linux
          path: public-apis-cli-*.tgz
          if-no-files-found: error
          retention-days: 7

  release-preflight-windows:
    name: Release preflight (Windows)
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.target == 'windows' || inputs.target == 'all') }}
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.10.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release preflight
        run: npm run release:preflight

      - name: Pack npm artifact
        run: npm pack --ignore-scripts

      - name: Upload npm artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-apis-cli-windows
          path: public-apis-cli-*.tgz
          if-no-files-found: error
          retention-days: 7
